<!DOCTYPE html>
<html lang="zh-TW">

    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>

            --neon-green: #39ff14; --neon-blue: #00f3ff; --neon-pink: #ff00ff;

            --text-main: #e0e0e0; --bg-panel: rgba(10, 10, 15, 0.85);

            background: linear-gradient(180deg, #0d0d1a 0%, #05050a 100%);
            border: 2px solid #222; box-shadow: 0 0 20px rgba(0, 243, 255, 0.15);
            position: relative; display: flex; flex-direction: column; overflow: hidden; transition: background 0.5s;
        }
        
        /* 戰鬥動態特效 */
        .shake { animation: shake 0.4s cubic-bezier(.36,.07,.19,.97) both; }
        .shake-hard { animation: shakeHard 0.5s cubic-bezier(.36,.07,.19,.97) both; }
        @keyframes shake { 10%, 90% { transform: translate3d(-2px, 0, 0); } 20%, 80% { transform: translate3d(4px, 0, 0); } 30%, 50%, 70% { transform: translate3d(-6px, 0, 0); } 40%, 60% { transform: translate3d(6px, 0, 0); } }
        @keyframes shakeHard { 10%, 90% { transform: translate3d(-5px, 5px, 0); } 20%, 80% { transform: translate3d(10px, -5px, 0); } 30%, 50%, 70% { transform: translate3d(-15px, 10px, 0); } 40%, 60% { transform: translate3d(15px, -10px, 0); } }
        
        .flash-red { animation: flashRed 0.3s ease-out; }
        .flash-boss { animation: flashBoss 0.5s ease-out; }
        @keyframes flashRed { 0% { background-color: rgba(255,0,0,0.6); } 100% { background-color: transparent; } }
        @keyframes flashBoss { 0% { background-color: rgba(255,0,68,0.8); } 100% { background-color: transparent; } }
        .flash-white { animation: flashWhite 0.2s ease-out; }
        @keyframes flashWhite { 0% { filter: brightness(3) drop-shadow(0 0 20px white); transform: scale(0.9); } 100% { filter: brightness(1); transform: scale(1); } }
        
        /* 怪物動畫 */
        .monster-idle { animation: breathe 2.5s ease-in-out infinite; }
        @keyframes breathe { 0%, 100% { transform: scale(1) translateY(0); } 50% { transform: scale(1.05) translateY(-10px); filter: drop-shadow(0 0 10px rgba(255,0,0,0.3)); } }
        .monster-attack { animation: lunge 0.4s cubic-bezier(0.25, 0.1, 0.25, 1); }
        @keyframes lunge { 0% { transform: translateY(0) scale(1); } 50% { transform: translateY(40px) scale(1.3); } 100% { transform: translateY(0) scale(1); } }
        .boss-idle { animation: bossBreathe 2s ease-in-out infinite; }
        @keyframes bossBreathe { 0%, 100% { transform: scale(1.2) translateY(0); } 50% { transform: scale(1.3) translateY(-15px); filter: drop-shadow(0 0 25px var(--boss-red)); } }

        /* 浮動傷害數字 */
        .damage-text { position: absolute; font-size: 2.2rem; font-weight: bold; color: #fff; text-shadow: 0 0 10px #f00, 2px 2px 0 #000; animation: floatUp 0.8s ease-out forwards; pointer-events: none; z-index: 50; opacity: 0; }
        .heal-text { color: var(--hp-green); text-shadow: 0 0 10px #0f0, 2px 2px 0 #000; }
        .crit-text { font-size: 3rem; color: #ffeb3b; text-shadow: 0 0 15px #ff9800, 3px 3px 0 #000; }
        .dmg-player { top: 45%; left: 20%; }
        .dmg-monster { top: 20%; left: 50%; transform: translateX(-50%); }
        @keyframes floatUp { 0% { transform: translateY(0) scale(0.5); opacity: 1; } 50% { transform: translateY(-30px) scale(1.2); opacity: 1; } 100% { transform: translateY(-50px) scale(1); opacity: 0; } }

        .screen { display: none; flex: 1; flex-direction: column; padding: 15px; position: relative; z-index: 3; height: 100%; }
        .active-screen { display: flex; }
        
        .battle-header { display: flex; justify-content: space-between; align-items: flex-start; margin-bottom: 5px; }
        .hp-box { width: 48%; background: rgba(0,0,0,0.7); padding: 8px; border-radius: 6px; border: 1px solid #333; }
        .hp-name { font-size: 0.8rem; margin-bottom: 4px; display: flex; justify-content: space-between; }
        .hp-bar-bg { width: 100%; height: 12px; background: #222; border-radius: 6px; overflow: hidden; border: 1px solid #000; }
        .hp-bar-fill { height: 100%; background: var(--hp-green); width: 100%; transition: width 0.4s ease-out, background-color 0.3s; }
        .boss-hp { background: var(--boss-red) !important; box-shadow: 0 0 10px var(--boss-red); }
        
        .monster-area { flex: 0.6; display: flex; flex-direction: column; justify-content: center; align-items: center; position: relative; }
        .monster-icon { font-size: 6.5rem; filter: drop-shadow(0 0 10px rgba(255,0,0,0.3)); transition: filter 0.3s; }
        
        .terminal-log { background: #000; border-left: 3px solid var(--neon-blue); height: 50px; overflow-y: hidden; padding: 5px 10px; font-size: 0.8rem; color: #0f0; margin-bottom: 10px; display: flex; flex-direction: column; justify-content: flex-end; }
        .log-entry { margin: 2px 0; opacity: 0.9; animation: fadeIn 0.3s; }
        @keyframes fadeIn { from { opacity: 0; transform: translateX(-5px); } to { opacity: 1; transform: translateX(0); } }
        
        .story-prompt { background: var(--bg-panel); border: 1px solid #444; border-radius: 8px; padding: 12px; font-size: 0.85rem; line-height: 1.4; color: var(--neon-pink); margin-bottom: 10px; text-align: justify; min-height: 65px; display: flex; align-items: center; }

        .options-area { display: flex; flex-direction: column; gap: 8px; flex: 1; overflow-y: auto; padding-bottom: 5px; }
        .action-btn { background: rgba(20, 20, 30, 0.9); color: var(--text-main); border: 1px solid #555; padding: 14px; font-size: 0.85rem; text-align: left; border-radius: 6px; cursor: pointer; transition: 0.2s; box-shadow: 0 2px 5px rgba(0,0,0,0.5); position: relative; overflow: hidden;}
        .action-btn:active { transform: scale(0.97); background: var(--neon-blue); color: #000; border-color: #fff; }
        .action-btn::before { content: '▶'; color: var(--neon-green); margin-right: 8px; font-size: 0.8rem; }

        .inventory-area { display: flex; gap: 10px; height: 55px; margin-top: auto; }
        .item-btn { flex: 1; background: #1a1a2e; border: 1px solid #888; color: #fff; border-radius: 6px; display: flex; flex-direction: column; align-items: center; justify-content: center; font-size: 0.75rem; cursor: pointer; position: relative; }

        .main-btn { background: var(--neon-green); color: #000; font-weight: bold; border: none; padding: 16px; border-radius: 8px; width: 100%; font-size: 1.1rem; margin-top: 15px; cursor: pointer; }

<body>

<div id="app-container">
    <div id="flashOverlay" class="full-screen-flash"></div>
    
    <div id="startScreen" class="screen active-screen" style="justify-content: center;">

        <div id="optionsContainer" class="options-area"></div>

        </div>
    </div>

    <div id="endScreen" class="screen">

        <button class="main-btn" onclick="location.reload()">[ 重啟模擬器 ]</button>
    </div>
</div>

    let playerScores = { CS: 0, IM: 0, AI: 0, DATA: 0, CHIPS: 0 };
    let appearCount = { CS: 0, IM: 0, AI: 0, DATA: 0, CHIPS: 0 };
    let currentEncounterIdx = 0;
    let currentPhaseIdx = 0;
    
    let hp = 200, maxHp = 200;
    let monsterHp = 200, monsterMaxHp = 200;
    let inventory = { potion: 2, shield: 1, boost: 0 };
    let activeBuffs = { shield: false, boost: false };
    let isAnimating = false;

    function logMsg(msg, color="#0f0") {
        const log = document.getElementById('terminalLog');
        const entry = document.createElement('div');
        entry.className = 'log-entry';
        entry.style.color = color;
        entry.innerText = `> ${msg}`;
        log.appendChild(entry);
        if(log.children.length > 3) log.removeChild(log.firstChild);
    }

    function createFloatingText(text, xClass, isHeal = false, isCrit = false) {
        const el = document.createElement('div');
        el.className = `damage-text ${xClass} ${isHeal ? 'heal-text' : ''} ${isCrit ? 'crit-text' : ''}`;
        el.innerText = text;
        document.getElementById('app-container').appendChild(el);
        setTimeout(() => el.remove(), 900);
    }

    function updateHpUI() {
        document.getElementById('playerHpText').innerText = `${Math.max(0, hp)}/${maxHp}`;
        const pBar = document.getElementById('playerHpBar');
        pBar.style.width = `${(Math.max(0, hp)/maxHp)*100}%`;
        pBar.style.backgroundColor = hp > 60 ? 'var(--hp-green)' : 'var(--hp-red)';

        document.getElementById('monsterHpText').innerText = `${Math.max(0, monsterHp)}/${monsterMaxHp}`;
        document.getElementById('monsterHpBar').style.width = `${(Math.max(0, monsterHp)/monsterMaxHp)*100}%`;
    }

    function updateInventoryUI() {
        ['potion', 'shield', 'boost'].forEach(item => { document.getElementById(`count-${item}`).innerText = inventory[item]; });
    }

    function startGame() {
        document.getElementById('startScreen').classList.remove('active-screen');
        document.getElementById('gameScreen').classList.add('active-screen');
        loadEncounter();
    }

    function loadEncounter() {
        if(currentEncounterIdx >= ENCOUNTERS.length) return showEnding();
        
        const enc = ENCOUNTERS[currentEncounterIdx];
        monsterMaxHp = enc.maxHp;
        monsterHp = monsterMaxHp;
        currentPhaseIdx = 0;
        
        document.getElementById('levelText').innerText = currentEncounterIdx + 1;
        document.getElementById('monsterNameDisplay').innerText = enc.name;
        document.getElementById('monsterIcon').innerText = enc.icon;
        document.getElementById('monsterIcon').className = `monster-icon ${enc.isBoss ? 'boss-idle' : 'monster-idle'}`;
        
        const mBar = document.getElementById('monsterHpBar');
        if(enc.isBoss) {
            mBar.classList.add('boss-hp');
            document.getElementById('app-container').style.background = "linear-gradient(180deg, #3a0000 0%, #05050a 100%)";
            logMsg("警告：偵測到魔王級實體！", "var(--boss-red)");
        } else {
            mBar.classList.remove('boss-hp');
            document.getElementById('app-container').style.background = "linear-gradient(180deg, #0d0d1a 0%, #05050a 100%)";
            logMsg(`遭遇 ${enc.name}，戰鬥開始。`, "#fff");
        }
        
        updateHpUI();
        loadPhase();
    }

    function loadPhase() {
        const enc = ENCOUNTERS[currentEncounterIdx];
        const phase = enc.phases[currentPhaseIdx];
        document.getElementById('storyPrompt').innerText = phase.prompt;
        
        let currentOptions = {};
        let available = Object.keys(phase.opts).sort((a, b) => appearCount[a] - appearCount[b]);
        let selected = available.slice(0, 4).sort(() => Math.random() - 0.5); // Randomize 4 options
        selected.forEach(type => { currentOptions[type] = phase.opts[type]; appearCount[type]++; });

        const container = document.getElementById('optionsContainer');
        container.innerHTML = '';
        Object.entries(currentOptions).forEach(([deptKey, text]) => {
            const btn = document.createElement('button');
            btn.className = 'action-btn';
            btn.innerText = text;
            btn.onclick = () => executeTurn(deptKey);
            container.appendChild(btn);
        });
    }

    function useItem(type) {
        if(isAnimating || inventory[type] <= 0) return;
        inventory[type]--;
        
        if(type === 'potion') {
            hp = Math.min(maxHp, hp + 80);
            createFloatingText("+80", "dmg-player", true);
            logMsg("使用恢復劑，回復 80 HP。", "var(--hp-green)");
        } else if(type === 'shield') {
            activeBuffs.shield = true;
            logMsg("絕對防禦啟動！格擋下次攻擊。", "var(--neon-blue)");
        } else if(type === 'boost') {
            activeBuffs.boost = true;
            logMsg("算力超頻啟動！爆擊機率與天賦加倍。", "var(--neon-pink)");
        }
        updateHpUI(); updateInventoryUI();
    }

    function executeTurn(deptKey) {
        if(isAnimating) return;
        isAnimating = true;
        document.getElementById('optionsContainer').innerHTML = ''; 

        let points = activeBuffs.boost ? 2 : 1;
        playerScores[deptKey] += points;

        const enc = ENCOUNTERS[currentEncounterIdx];
        const totalPhases = enc.phases.length;
        
        // 傷害計算
        let isCrit = activeBuffs.boost || Math.random() < 0.2;
        activeBuffs.boost = false;
        let expectedDmg = Math.ceil(enc.maxHp / totalPhases);
        let dmgDealt = expectedDmg + (isCrit ? 20 : Math.floor(Math.random()*10 - 5));
        if (currentPhaseIdx === totalPhases - 1) dmgDealt = monsterHp; // 最後一擊必殺
        
        logMsg(`你施展了招式！造成 ${dmgDealt} 點傷害。`, "var(--neon-blue)");
        
        const mIcon = document.getElementById('monsterIcon');
        mIcon.classList.add('flash-white');
        createFloatingText(`-${dmgDealt}`, "dmg-monster", false, isCrit);
        monsterHp -= dmgDealt;
        updateHpUI();

        setTimeout(() => {
            mIcon.classList.remove('flash-white');
            
            if (monsterHp <= 0) {
                logMsg(`成功擊殺 ${enc.name}！`, "var(--neon-green)");
                mIcon.style.filter = "brightness(0)";
                
                // 30% 機率掉落道具
                if(Math.random() < 0.3) {
                    let randItem = ['potion', 'shield', 'boost'][Math.floor(Math.random()*3)];
                    inventory[randItem]++;
                    logMsg(`獲得戰利品！`, "var(--neon-pink)");
                    updateInventoryUI();
                }

                setTimeout(() => {
                    mIcon.style.filter = "";
                    currentEncounterIdx++;
                    isAnimating = false;
                    loadEncounter();
                }, 1000);

            } else {
                // 怪物反擊
                mIcon.classList.remove(enc.isBoss ? 'boss-idle' : 'monster-idle');
                mIcon.classList.add('monster-attack');
                
                setTimeout(() => {
                    let enemyDmg = enc.isBoss ? (Math.floor(Math.random()*20)+25) : (Math.floor(Math.random()*15)+10);
                    
                    if(activeBuffs.shield) {
                        logMsg("護盾成功格擋了攻擊！", "var(--neon-green)");
                        createFloatingText("BLOCKED", "dmg-player", true);
                        activeBuffs.shield = false;
                    } else {
                        hp -= enemyDmg;
                        logMsg(`怪物反擊，造成 ${enemyDmg} 點傷害！`, "var(--hp-red)");
                        createFloatingText(`-${enemyDmg}`, "dmg-player");
                        
                        // 魔王攻擊特別震動
                        const app = document.getElementById('app-container');
                        app.classList.add(enc.isBoss ? 'shake-hard' : 'shake');
                        document.getElementById('flashOverlay').classList.add(enc.isBoss ? 'flash-boss' : 'flash-red');
                    }
                    updateHpUI();
                    
                    setTimeout(() => {
                        document.getElementById('app-container').classList.remove('shake', 'shake-hard');
                        document.getElementById('flashOverlay').classList.remove('flash-red', 'flash-boss');
                        mIcon.classList.remove('monster-attack');
                        mIcon.classList.add(enc.isBoss ? 'boss-idle' : 'monster-idle');
                        
                        if(hp <= 0) {
                            hp = 80; updateHpUI();
                            logMsg("系統崩潰！緊急重啟恢復 80 HP。", "#ffaa00");
                            alert("血量歸零！防禦機制已緊急將您拉回戰線...");
                        }
                        
                        currentPhaseIdx++;
                        isAnimating = false;
                        loadPhase();
                    }, 400);
                }, 200); 
            }
        }, 600); 
    }

    function showEnding() {
        document.getElementById('gameScreen').classList.remove('active-screen');
        document.getElementById('endScreen').classList.add('active-screen');
        document.getElementById('app-container').style.background = "linear-gradient(180deg, #05050a 0%, #11111f 100%)";
        
        let highestKey = Object.keys(playerScores).reduce((a, b) => playerScores[a] > playerScores[b] ? a : b);
        let bestDept = DEPT_INFO[highestKey];
        
        document.getElementById('finalDesc').innerHTML = `
            世界已恢復平靜。<br>
            在隱藏學系名稱的情況下，你憑藉最真實的直覺完成了 20 場史詩戰役。<br><br>
            系統判定，你的核心靈魂屬於：<br>
            <div style="text-align:center; font-size:1.6rem; color:var(--neon-green); margin:12px 0; text-shadow:0 0 5px var(--neon-green);">【${bestDept.name}】</div>
            <i>"${bestDept.desc}"</i><br><br>
            靜宜大學資訊學院，將為你的天賦提供最強的裝備。
        `;
        
        const ctx = document.getElementById('radarChart').getContext('2d');
        new Chart(ctx, {
            type: 'radar',
            data: {
                labels: ['資訊工程', '資訊管理', '人工智慧', '資料科學', '晶片學程'],
                datasets: [{ data: [playerScores.CS, playerScores.IM, playerScores.AI, playerScores.DATA, playerScores.CHIPS], backgroundColor: 'rgba(57, 255, 20, 0.3)', borderColor: '#39ff14', pointBackgroundColor: '#0ff', borderWidth: 2 }]
            },
            options: {
                responsive: true, maintainAspectRatio: false,
                scales: { r: { angleLines: { color: '#444' }, grid: { color: '#444' }, pointLabels: { color: '#0ff', font: { size: 12 } }, ticks: { display: false, min: 0 } } },
                plugins: { legend: { display: false } }
            }
        });
    }
</script>
